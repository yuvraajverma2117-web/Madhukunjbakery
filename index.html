<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Madhukunj Bakers – Freshly Baked Delights</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
<style>
:root,[data-theme="light"]{
  --cream:#fdf7f0;--warm:#f5e6cc;--brown:#5c3317;--dark:#2b1a0e;
  --gold:#c9843a;--rose:#d4605a;--blush:#f0c4a0;--muted:#7a5535;
  --shadow:rgba(92,51,23,.10);--shadow-lg:rgba(92,51,23,.20);
  --green:#2e7d32;
  --card-bg:#ffffff;
  --nav-bg:rgba(253,247,240,.92);
  --input-bg:#fdf7f0;
  --input-border:#e8ddd0;
  --input-text:#2b1a0e;
  --modal-bg:#ffffff;
  --footer-bg:#1a0f07;
  --adm-item-bg:#f5e6cc;
  --stat-box-bg:#f5e6cc;
  --order-card-bg:#fdf7f0;
  --my-order-bg:#f5e6cc;
  --hero-bg:radial-gradient(ellipse at 62% 48%,#fdf3e5,#f5dcb0 55%,#eac98a);
  --gate-bg:radial-gradient(ellipse at 50% 55%,#fdf1e2,#e8c080);
  --mobile-menu-bg:#fdf7f0;
  --section-dark-bg:#2b1a0e;
  --text-on-dark:rgba(255,255,255,.75);
  --title-on-dark:#ffffff;
  --border-subtle:rgba(201,132,58,.15);
}

[data-theme="dark"]{
  --cream:#1a1008;--warm:#231508;--brown:#e0a060;--dark:#f5e6cc;
  --gold:#f0a84a;--rose:#e87070;--blush:#5a3520;--muted:#c8a07a;
  --shadow:rgba(0,0,0,.30);--shadow-lg:rgba(0,0,0,.50);
  --green:#4caf50;
  --card-bg:#2a1a0a;
  --nav-bg:rgba(20,10,4,.92);
  --input-bg:#2a1a0a;
  --input-border:#5a3520;
  --input-text:#f5e6cc;
  --modal-bg:#2a1a0a;
  --footer-bg:#0f0804;
  --adm-item-bg:#331f0d;
  --stat-box-bg:#331f0d;
  --order-card-bg:#2a1a0a;
  --my-order-bg:#331f0d;
  --hero-bg:radial-gradient(ellipse at 62% 48%,#2a1508,#1a0d04 55%,#110800);
  --gate-bg:radial-gradient(ellipse at 50% 55%,#2a1508,#1a0d04);
  --mobile-menu-bg:#0f0804;
  --section-dark-bg:#0f0804;
  --text-on-dark:rgba(255,255,255,.80);
  --title-on-dark:#ffffff;
  --border-subtle:rgba(240,168,74,.15);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--dark);overflow-x:hidden;transition:background .35s,color .35s}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit}

.theme-toggle{position:relative;width:52px;height:28px;cursor:pointer;flex-shrink:0}
.theme-toggle input{position:absolute;opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;border-radius:999px;transition:all .45s cubic-bezier(.34,1.56,.64,1);overflow:hidden}
[data-theme="light"] .toggle-track{background:linear-gradient(135deg,#87ceeb,#ffd700)}
[data-theme="dark"] .toggle-track{background:linear-gradient(135deg,#1a237e,#283593)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:all .45s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.25);z-index:2}
[data-theme="dark"] .toggle-thumb{transform:translateX(24px)}
[data-theme="light"] .toggle-thumb::after{content:'☀️'}
[data-theme="dark"] .toggle-thumb::after{content:'🌙'}

#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);z-index:9999;background:var(--dark);color:var(--cream);padding:.75rem 1.5rem;border-radius:999px;font-size:.85rem;font-weight:600;transition:transform .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;border:1px solid var(--border-subtle)}
#toast.show{transform:translateX(-50%) translateY(0)}

#cookieBanner{position:fixed;bottom:0;left:0;right:0;z-index:9990;background:var(--dark);color:var(--cream);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;padding:1rem 2rem;font-size:.84rem;transform:translateY(110%);transition:transform .45s ease}
#cookieBanner.show{transform:translateY(0)}
.ck-btns{display:flex;gap:.7rem}
.ck-btn{padding:.45rem 1.1rem;border-radius:999px;border:none;font-weight:700;font-size:.78rem;transition:all .2s;cursor:pointer}
.ck-accept{background:var(--gold);color:#fff}.ck-accept:hover{background:var(--brown)}
.ck-decline{background:transparent;color:var(--cream);border:1px solid rgba(255,255,255,.3)}.ck-decline:hover{color:#fff}

#loginGate{position:fixed;inset:0;z-index:8000;background:var(--gate-bg);display:flex;align-items:center;justify-content:center;padding:1.5rem;transition:background .35s}
.login-box{background:var(--modal-bg);border-radius:28px;padding:2.8rem 2.4rem;max-width:420px;width:100%;text-align:center;box-shadow:0 30px 80px var(--shadow-lg);animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both;transition:background .35s}
.login-brand{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:700;color:var(--dark);margin-bottom:.15rem}
.login-brand span{font-family:'Dancing Script',cursive;color:var(--gold)}
.login-sub{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:1.5rem}
.login-emoji{font-size:3rem;display:block;margin-bottom:.8rem}
.login-box h2{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:700;color:var(--dark);margin-bottom:.4rem}
.login-box>p{font-size:.88rem;color:var(--muted);margin-bottom:1.4rem;line-height:1.65}
.inp{width:100%;padding:.8rem 1.1rem;border:2px solid var(--input-border);border-radius:14px;font-family:'Outfit',sans-serif;font-size:.95rem;color:var(--input-text);background:var(--input-bg);outline:none;transition:border-color .2s,background .35s,color .35s;margin-bottom:.9rem}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--muted);opacity:.7}
input[type="date"].inp{color-scheme:light}
[data-theme="dark"] input[type="date"].inp{color-scheme:dark;color:var(--input-text)}
.btn-login{width:100%;padding:.9rem;border-radius:999px;border:none;background:var(--brown);color:#fff;font-weight:700;font-size:1rem;transition:all .25s;margin-bottom:.9rem;cursor:pointer}
.btn-login:hover{background:var(--gold);transform:translateY(-2px)}
.login-skip{font-size:.8rem;color:var(--muted);background:none;border:none;text-decoration:underline;transition:color .2s;cursor:pointer}
.login-skip:hover{color:var(--gold)}
.login-err{color:var(--rose);font-size:.8rem;margin-bottom:.6rem;display:none}
.fb-loading{font-size:.82rem;color:var(--muted);text-align:center;padding:.5rem}

.phone-row{display:flex;gap:.5rem;margin-bottom:.9rem}
.phone-prefix{padding:.8rem .9rem;border:2px solid var(--input-border);border-radius:14px;background:var(--input-bg);color:var(--input-text);font-size:.95rem;font-weight:700;min-width:60px;text-align:center}
.phone-row .inp{margin-bottom:0;flex:1}

nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:.85rem 2rem;background:var(--nav-bg);backdrop-filter:blur(14px);border-bottom:1px solid var(--border-subtle);transition:background .35s}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--brown);user-select:none;cursor:pointer}
.nav-logo span{font-family:'Dancing Script',cursive;color:var(--gold)}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{font-size:.86rem;font-weight:600;color:var(--dark);transition:color .2s}
.nav-links a:hover{color:var(--gold)}
.nav-right{display:flex;align-items:center;gap:.75rem;position:relative}
#navUserPill{display:none;align-items:center;gap:.5rem;background:var(--warm);border-radius:999px;padding:.32rem .9rem .32rem .45rem;font-size:.8rem;font-weight:700;color:var(--brown);cursor:pointer;position:relative;user-select:none;transition:background .35s}
#navUserPill:hover{background:var(--blush)}
#navAvatar{width:28px;height:28px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;overflow:hidden}
#navAvatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.dropdown-arrow{font-size:.65rem;margin-left:.2rem;transition:transform .2s}
#navUserPill.open .dropdown-arrow{transform:rotate(180deg)}
.dropdown-menu{display:none;position:absolute;top:calc(100% + .5rem);right:0;background:var(--modal-bg);border-radius:14px;border:1px solid var(--border-subtle);box-shadow:0 12px 35px var(--shadow-lg);min-width:180px;overflow:hidden;z-index:600;animation:fadeDown .2s ease;transition:background .35s}
.dropdown-menu.open{display:block}
.dropdown-menu button{width:100%;padding:.72rem 1.1rem;border:none;background:transparent;text-align:left;font-size:.85rem;font-weight:600;color:var(--dark);transition:background .15s;display:flex;align-items:center;gap:.5rem}
.dropdown-menu button:hover{background:var(--warm)}
.dropdown-menu .logout-btn{color:var(--rose)}
.dropdown-divider{height:1px;background:var(--border-subtle);margin:.2rem 0}
#adminTrigger{display:none;background:var(--gold);color:#fff;border:none;padding:.48rem 1.1rem;border-radius:999px;font-size:.8rem;font-weight:700;transition:background .2s}
#adminTrigger:hover{background:var(--brown)}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;padding:.4rem;cursor:pointer;z-index:600}
.hamburger span{display:block;width:22px;height:2px;background:var(--brown);border-radius:2px;transition:all .3s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;top:62px;left:0;right:0;z-index:490;background:var(--mobile-menu-bg);border-top:1px solid var(--border-subtle);padding:1.2rem 1.5rem;flex-direction:column;gap:.2rem;box-shadow:0 12px 30px var(--shadow);transition:background .35s}
.mobile-menu.open{display:flex}
.mobile-menu a{font-size:1rem;font-weight:600;color:var(--dark);padding:.7rem .5rem;border-bottom:1px solid var(--border-subtle);transition:color .2s}
.mobile-menu a:last-of-type{border-bottom:none}
.mobile-menu a:hover{color:var(--gold)}
.mobile-menu .mob-order{margin-top:.6rem;background:var(--brown);color:#fff;text-align:center;padding:.8rem;border-radius:999px;font-weight:700;font-size:.9rem}
.mobile-menu .mob-order:hover{background:var(--gold)}

.hero{min-height:100vh;padding-top:70px;background:var(--hero-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding-inline:2rem;position:relative;overflow:hidden;transition:background .35s}
.hero::before{content:'';position:absolute;inset:0;pointer-events:none;background:url("data:image/svg+xml,%3Csvg width='70' height='70' viewBox='0 0 70 70' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='35' cy='35' r='2.5' fill='%23c9843a' fill-opacity='0.07'/%3E%3C/svg%3E")}
.hero-badge{display:inline-flex;align-items:center;gap:.5rem;background:var(--brown);color:#fff;font-size:.66rem;letter-spacing:.22em;text-transform:uppercase;padding:.45rem 1.3rem;border-radius:999px;margin-bottom:1.8rem;animation:fadeDown .7s ease both}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(3.4rem,10vw,7.5rem);font-weight:700;color:var(--dark);line-height:1.05;animation:fadeDown .8s .1s ease both}
.hero h1 em{font-family:'Dancing Script',cursive;color:var(--gold);font-style:normal;display:block;font-size:clamp(2.6rem,7.5vw,5.5rem)}
.hero-p{max-width:480px;margin-top:1.3rem;font-size:1.05rem;color:var(--muted);line-height:1.75;animation:fadeDown .9s .2s ease both}
.hero-cta{margin-top:2.5rem;display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;animation:fadeDown 1s .3s ease both}
.btn{padding:.85rem 2.1rem;border-radius:999px;font-weight:700;font-size:.93rem;border:2px solid transparent;transition:all .25s;display:inline-block}
.btn-primary{background:var(--brown);color:#fff}.btn-primary:hover{background:var(--gold);transform:translateY(-3px)}
.btn-outline{background:transparent;border-color:var(--brown);color:var(--brown)}.btn-outline:hover{background:var(--brown);color:#fff;transform:translateY(-3px)}
.floaty{position:absolute;font-size:5rem;opacity:.11;animation:float 7s ease-in-out infinite;pointer-events:none;user-select:none}
.f1{top:12%;left:4%}.f2{top:16%;right:6%;font-size:3.5rem;animation-delay:1.8s}.f3{bottom:18%;left:7%;font-size:4rem;animation-delay:3.2s}.f4{bottom:20%;right:5%;animation-delay:2s}
.order-strip{background:var(--gold);color:#fff;text-align:center;padding:1.1rem 2rem;font-weight:700;font-size:.9rem}
.order-strip a{color:#fff;text-decoration:underline;margin-left:.5rem}

.menu-sec{padding:5rem 2rem;background:var(--warm);transition:background .35s}
.sec-inner{max-width:1120px;margin:0 auto}
.sec-eye{font-size:.66rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:.4rem}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:700;color:var(--dark);line-height:1.15}
.sec-title em{color:var(--gold);font-style:italic}
.cat-tabs{display:flex;gap:.6rem;flex-wrap:wrap;margin:2.5rem 0}
.cat-tab{padding:.52rem 1.35rem;border-radius:999px;border:2px solid var(--blush);background:transparent;color:var(--muted);font-weight:700;font-size:.86rem;transition:all .25s}
.cat-tab.active,.cat-tab:hover{background:var(--brown);border-color:var(--brown);color:#fff}
.cake-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.8rem}
.cake-card{background:var(--card-bg);border-radius:20px;overflow:hidden;box-shadow:0 4px 22px var(--shadow);transition:transform .3s,box-shadow .3s,background .35s;animation:fadeUp .5s ease both}
.cake-card:hover{transform:translateY(-7px);box-shadow:0 16px 40px var(--shadow-lg)}
.cake-img-wrap{width:100%;aspect-ratio:4/3;overflow:hidden;background:linear-gradient(135deg,var(--warm),var(--blush));display:flex;align-items:center;justify-content:center;position:relative}
.cake-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.cake-card:hover .cake-img-wrap img{transform:scale(1.06)}
.cake-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;font-size:3.5rem;opacity:.35}
.cake-ph p{font-size:.7rem;color:var(--muted);margin-top:.35rem}
.cake-badge{position:absolute;top:.7rem;left:.7rem;background:var(--rose);color:#fff;font-size:.6rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:.28rem .65rem;border-radius:999px}
.cake-info{padding:1.2rem}
.cake-name{font-family:'Cormorant Garamond',serif;font-size:1.18rem;font-weight:700;color:var(--dark)}
.cake-cat{font-size:.7rem;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-top:.18rem}
.cake-desc{font-size:.82rem;color:var(--muted);margin-top:.45rem;line-height:1.55}
.btn-order-cake{width:100%;margin-top:.7rem;padding:.6rem;border-radius:999px;border:none;background:var(--brown);color:#fff;font-size:.82rem;font-weight:700;transition:background .2s}
.btn-order-cake:hover{background:var(--gold)}
.loading-grid{text-align:center;padding:3rem;color:var(--muted);font-size:.9rem}

.orders-sec{padding:5rem 2rem;background:var(--cream);transition:background .35s}
.order-form-wrap{max-width:560px;margin:2.5rem auto 0;background:var(--card-bg);border-radius:24px;padding:2rem;box-shadow:0 8px 30px var(--shadow);transition:background .35s}
.order-form-wrap .fg input[type="date"]{display:block;width:100%}

.about-sec{background:var(--section-dark-bg);padding:5rem 2rem;text-align:center;transition:background .35s}
.about-sec .sec-eye{color:var(--gold)}
.about-sec .sec-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2rem,5vw,3.5rem);
  font-weight:700;
  line-height:1.15;
  color:#ffffff !important;
}
.about-sec .sec-title em{color:var(--gold);font-style:italic}
.about-sec .about-body{
  max-width:600px;
  margin:1.5rem auto 0;
  font-size:1rem;
  line-height:1.82;
  color:rgba(255,255,255,.82) !important;
}
.feats{display:flex;gap:1.5rem;flex-wrap:wrap;justify-content:center;margin-top:3rem}
.feat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:1.8rem 1.5rem;max-width:200px;text-align:center;transition:background .3s}
.feat:hover{background:rgba(255,255,255,.11)}
.feat-ic{font-size:2.3rem;margin-bottom:.7rem}
.feat h4{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--gold);margin-bottom:.35rem}
.feat p{font-size:.8rem;color:rgba(255,255,255,.72);line-height:1.5}

footer{background:var(--footer-bg);color:rgba(255,255,255,.42);text-align:center;padding:2.5rem;font-size:.82rem;line-height:1.9;transition:background .35s}
footer strong{color:var(--gold)}

.overlay{display:none;position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.55);backdrop-filter:blur(5px);align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--modal-bg);border-radius:26px;padding:2.5rem;max-width:520px;width:100%;max-height:92vh;overflow-y:auto;position:relative;box-shadow:0 35px 90px rgba(0,0,0,.28);animation:popIn .3s ease;transition:background .35s}
.modal-close{position:absolute;top:1.1rem;right:1.3rem;background:none;border:none;font-size:1.4rem;color:var(--muted);cursor:pointer}
.modal-close:hover{color:var(--rose)}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--dark);margin-bottom:.3rem}
.modal .sub{font-size:.82rem;color:var(--muted);margin-bottom:1.8rem}
.fg{margin-bottom:1rem}
.fg label{display:block;font-size:.8rem;font-weight:700;color:var(--dark);margin-bottom:.35rem}
.fg input,.fg select,.fg textarea{width:100%;padding:.75rem 1rem;border:2px solid var(--input-border);border-radius:12px;font-family:'Outfit',sans-serif;font-size:.9rem;color:var(--input-text);background:var(--input-bg);outline:none;transition:border-color .2s,background .35s,color .35s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold)}
.fg input[type="date"]{color-scheme:auto}
[data-theme="dark"] .fg input[type="date"]{color-scheme:dark;color:var(--input-text)}
.err{color:var(--rose);font-size:.8rem;display:none;margin-top:.3rem}
.err.show{display:block}
.btn-full{width:100%;margin-top:.4rem;padding:.88rem;border-radius:999px;font-size:.93rem;font-weight:700;border:none;cursor:pointer}
.btn-br{background:var(--brown);color:#fff;transition:background .2s}.btn-br:hover{background:var(--gold)}
.btn-rs{background:var(--rose);color:#fff}
.btn-edit{background:var(--gold);color:#fff;border:none;padding:.28rem .65rem;border-radius:8px;font-size:.76rem;font-weight:700;flex-shrink:0;cursor:pointer;margin-right:.3rem}
.btn-del{background:var(--rose);color:#fff;border:none;padding:.28rem .65rem;border-radius:8px;font-size:.76rem;font-weight:700;flex-shrink:0;cursor:pointer}
.adm-item{display:flex;align-items:center;justify-content:space-between;background:var(--adm-item-bg);padding:.7rem 1rem;border-radius:10px;font-size:.82rem;gap:.5rem;transition:background .35s;flex-wrap:wrap}
.adm-item span{flex:1;color:var(--dark)}
.adm-item .cpill{font-size:.68rem;color:var(--gold);font-weight:700;text-transform:uppercase}
.adm-item .adm-btns{display:flex;gap:.3rem;flex-shrink:0}
hr.div{border:none;border-top:1px solid var(--border-subtle);margin:1.4rem 0}
.stat-row{display:grid;grid-template-columns:repeat(2,1fr);gap:.7rem;margin-bottom:1rem}
.stat-box{background:var(--stat-box-bg);border-radius:12px;padding:.9rem 1rem;text-align:center;transition:background .35s}
.stat-box .s-num{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--gold)}
.stat-box .s-lbl{font-size:.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.08em}

.order-card{background:var(--order-card-bg);border-radius:12px;padding:1rem;margin-bottom:.6rem;border-left:4px solid var(--gold);transition:background .35s}
.order-card .o-name{font-weight:700;color:var(--dark);font-size:.9rem}
.order-card .o-detail{font-size:.78rem;color:var(--muted);margin-top:.2rem;line-height:1.5}
.order-card .o-status{display:inline-block;font-size:.65rem;font-weight:800;text-transform:uppercase;padding:.2rem .6rem;border-radius:999px;margin-top:.4rem}
.status-new{background:#fff3e0;color:#e65100}
.status-confirmed{background:#e8f5e9;color:#2e7d32}
.status-done{background:#e3f2fd;color:#1565c0}
.btn-status{background:var(--gold);color:#fff;border:none;padding:.25rem .6rem;border-radius:8px;font-size:.72rem;font-weight:700;cursor:pointer;margin-left:.4rem}

.profile-info{text-align:center;padding:1rem 0}
.profile-avatar-big{width:72px;height:72px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;margin:0 auto 1rem;overflow:hidden}
.profile-avatar-big img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.p-detail{font-size:.88rem;color:var(--muted);margin:.3rem 0}
.p-detail strong{color:var(--dark)}

.my-order-card{background:var(--my-order-bg);border-radius:12px;padding:.9rem 1rem;margin-bottom:.6rem;transition:background .35s}
.my-order-card .mo-cake{font-weight:700;font-size:.9rem;color:var(--dark)}
.my-order-card .mo-date{font-size:.75rem;color:var(--muted);margin-top:.2rem}

.btn-google{width:100%;padding:.85rem;border-radius:999px;border:2px solid var(--input-border);background:var(--card-bg);color:var(--dark);font-weight:700;font-size:.93rem;display:flex;align-items:center;justify-content:center;gap:.6rem;margin-bottom:.8rem;transition:all .25s;cursor:pointer}
.btn-google:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 15px var(--shadow)}
.btn-google svg{width:20px;height:20px;flex-shrink:0}
.divider-or{display:flex;align-items:center;gap:.8rem;margin-bottom:.9rem;color:var(--muted);font-size:.78rem;font-weight:600}
.divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:var(--input-border)}
.verified-badge{display:inline-flex;align-items:center;gap:.3rem;background:#e8f5e9;color:#2e7d32;font-size:.72rem;font-weight:700;padding:.2rem .6rem;border-radius:999px;margin-left:.4rem}
[data-theme="dark"] .verified-badge{background:#1b4332;color:#69db7c}

.edit-modal-inner{display:none}
.edit-modal-inner.open{display:block}

@keyframes fadeDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-16px) rotate(6deg)}}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
.loader{width:20px;height:20px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle;margin-right:.4rem}

@media(max-width:640px){
  .nav-links{display:none}
  nav{padding:.75rem 1rem}
  .hero{padding-top:65px}
  .modal{padding:2rem 1.4rem}
  .login-box{padding:2rem 1.4rem}
  .hamburger{display:flex}
  .nav-right{gap:.5rem}
  #adminTrigger{padding:.4rem .8rem;font-size:.75rem}
  .stat-row{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
